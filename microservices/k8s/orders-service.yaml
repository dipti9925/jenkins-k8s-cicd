apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-service
          image: orders-service:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: USERS_SERVICE_URL
              value: "http://users-service:4000"
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
spec:
  type: NodePort
  selector:
    app: orders-service
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050
